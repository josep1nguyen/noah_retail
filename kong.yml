_format_version: "2.1"
_transform: true

services:
  - name: order-api-service
    url: http://order_api:5000
    routes:
      - name: order-api-route
        paths:
          - /api
        strip_path: false
    plugins:
      - name: key-auth
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  - name: dashboard-service
    url: http://dashboard:8501
    routes:
      - name: dashboard-route
        paths:
          - /dashboard
        strip_path: false

consumers:
  - username: noah_admin
    keyauth_credentials:
      - key: noah-secret-key-2024
      